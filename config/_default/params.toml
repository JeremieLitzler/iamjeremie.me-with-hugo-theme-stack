# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["post", "quick-tips"]
# Output page's full content in RSS.
rssFullContent = true
favicon = "/favicon.ico"

[footer]
since = 2018
customText = 'License GPLv3 | <a href="https://iamjeremie.me/page/terms/" title="Read terms and conditions of this website">Terms</a>'

[dateFormat]
published = "Jan 02, 2006"
lastUpdated = "Jan 02, 2006 15:04 MST"

[sidebar]
subtitle = "I share my notes and experiences that can be useful to one of you. Enjoy the read!"

[sidebar.avatar]
enabled = true
local = true
src = "img/profilepic-400w.jpg"

[article]
math = false
readingTime = true
featureImgAltPrefix = "Image de l'article"

[article.license]
enabled = true
default = "Licensed under CC BY-NC-SA 4.0"

# Mermaid diagram configuration
# Diagrams are only loaded when mermaid code blocks are present
# Theme auto-switches based on site light/dark mode
[article.mermaid]
    # Visual style: classic or handDrawn (sketch style)
    look = "classic"
    # Theme for light mode: default, neutral, dark, forest, base, null
    lightTheme = "default"
    # Theme for dark mode: default, neutral, dark, forest, base, null
    darkTheme = "dark"
    # Custom theme variables for light mode (only works with lightTheme: base)
    # lightThemeVariables = { primaryColor = "#ff0000" }
    # Custom theme variables for dark mode (only works with darkTheme: base)
    # darkThemeVariables = { primaryColor = "#00ff00" }
    # Security level: strict (default), loose, antiscript, sandbox
    # Set to "loose" to enable HTML labels like <br/>
    securityLevel = "strict"
    # Enable HTML labels in diagrams (requires securityLevel: loose)
    htmlLabels = true
    # Make diagram backgrounds transparent (default: false)
    # Can also be set per-diagram with %%transparent%% directive
    transparentBackground = false

## Widgets
[[widgets.homepage]]
type = "search"

[[widgets.homepage]]
type = "archives"

[widgets.homepage.params]
limit = 8

[[widgets.homepage]]
type = "categories"

[widgets.homepage.params]
limit = 5

[[widgets.homepage]]
type = "tag-cloud"

[widgets.homepage.params]
limit = 5

[[widgets.page]]
type = "toc"

[[widget.tagCloud]]
title = "Categories"

[opengraph.twitter]
site = ""
card = "summary_large_image"

[defaultImage.opengraph]
enabled = true
local = true
src = "img/profilepic-400w.jpg"

[colorScheme]
toggle = true
default = "auto"

[imageProcessing.cover]
enabled = true

[imageProcessing.content]
enabled = true

## Comments
[comments]
enabled = false

[comments.giscus]
repo = ""
repoID = ""
category = ""
categoryID = ""
mapping = ""
lightTheme = ""
darkTheme = ""
reactionsEnabled = 1
emitMetadata = 0
